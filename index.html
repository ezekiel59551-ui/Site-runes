<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Créateur de Bindrunes — Atelier ésotérique</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <style>
    :root {
      --bg: #20160f;
      --panel: rgba(84, 63, 41, 0.78);
      --panel-2: rgba(120, 92, 59, 0.22);
      --text: #2f2014;
      --text-light: #f6ead2;
      --muted: #6f5437;
      --accent: #b8893c;
      --accent-2: #e2c98a;
      --border: #8a6a3e;
      --border-soft: #9b7a49;
      --parchment: #efe0b8;
      --parchment-2: #e2c993;
      --shadow: rgba(42, 24, 10, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Iowan Old Style", "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(255, 215, 130, 0.10), transparent 28%),
        radial-gradient(circle at 20% 10%, rgba(255, 236, 173, 0.08), transparent 18%),
        linear-gradient(180deg, #1a120c, #2a1d13 42%, #140d08);
      color: var(--text-light);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 219, 143, 0.07), transparent 12%),
        radial-gradient(circle at 75% 15%, rgba(255, 215, 130, 0.05), transparent 10%),
        radial-gradient(circle at 65% 75%, rgba(255, 236, 173, 0.05), transparent 12%);
      mix-blend-mode: screen;
    }

    .wrap {
      max-width: 1360px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2.35rem;
      letter-spacing: 0.03em;
      color: var(--accent-2);
      text-shadow: 0 0 12px rgba(226, 201, 138, 0.22);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: #d9bc7a;
      letter-spacing: .18em;
      text-transform: uppercase;
      font-size: .82rem;
    }

    .lead {
      margin: 0 0 24px;
      color: #ead9b7;
      max-width: 920px;
      line-height: 1.6;
      font-size: 1.02rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px minmax(380px, 1fr) 320px;
      gap: 18px;
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(246, 231, 196, 0.96), rgba(227, 204, 153, 0.93));
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 14px 40px var(--shadow), inset 0 0 0 1px rgba(255, 239, 197, 0.35);
      position: relative;
      color: var(--text);
      overflow: hidden;
    }

    .panel::before {
      content: "✦";
      position: absolute;
      top: 10px;
      right: 14px;
      color: rgba(136, 91, 28, 0.35);
      font-size: 1rem;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 1.05rem;
      color: #6e4518;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: .86rem;
      color: #6b4b2a;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    select, button {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(255, 247, 225, 0.78);
      color: #392516;
      border-radius: 12px;
      padding: 9px 12px;
      font-size: .95rem;
      font-family: inherit;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background:
        linear-gradient(rgba(255, 247, 225, 0.78), rgba(255, 247, 225, 0.78)),
        linear-gradient(45deg, transparent 50%, #8d6630 50%),
        linear-gradient(135deg, #8d6630 50%, transparent 50%);
      background-repeat: no-repeat;
      background-position: 0 0, calc(100% - 18px) 50%, calc(100% - 12px) 50%;
      background-size: 100% 100%, 6px 6px, 6px 6px;
      padding-right: 34px;
    }

    select option {
      background: #f7eed9;
      color: #392516;
    }

    button {
      cursor: pointer;
      transition: .18s ease;
    }

    button:hover {
      border-color: #9f6d25;
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(120, 77, 20, 0.18);
    }

    .btn-accent {
      background: linear-gradient(180deg, #d8b46a, #b07a2d);
      color: #fff7e8;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0,0,0,0.25);
    }

    .btn-soft {
      background: linear-gradient(180deg, rgba(255, 241, 208, 0.88), rgba(228, 205, 157, 0.9));
      color: #6a451b;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .btn-row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .slots {
      display: grid;
      gap: 8px;
    }

    .slot-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      align-items: center;
    }

    .slot-tag {
      font-size: .72rem;
      color: #7b5a37;
      text-transform: uppercase;
      min-width: 46px;
      text-align: right;
      font-weight: 600;
    }

    .subtle {
      color: #5d4127;
      font-size: .92rem;
      line-height: 1.55;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid #a88654;
      background: linear-gradient(180deg, rgba(255,243,214,0.9), rgba(233,213,171,0.92));
      color: #6b471f;
      font-size: .82rem;
      margin-right: 6px;
      margin-bottom: 6px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.35);
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(184, 137, 60, .6), transparent);
      margin: 4px 0;
    }

    .canvas-wrap {
      display: grid;
      gap: 18px;
    }

    .canvas-box {
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.25), transparent 22%),
        linear-gradient(180deg, var(--parchment), var(--parchment-2));
      border-radius: 22px;
      border: 2px solid #8a6a3e;
      overflow: hidden;
      aspect-ratio: 1/1;
      min-height: 430px;
      box-shadow: inset 0 0 40px rgba(122, 81, 31, 0.18);
      position: relative;
    }

    .canvas-box::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(90,63,30,.28);
      border-radius: 14px;
      pointer-events: none;
    }

    .canvas-box::after {
      content: "☘ ᚠ ᚱ ᛉ ᛟ";
      position: absolute;
      bottom: 14px;
      right: 18px;
      color: rgba(54,35,18,.25);
      font-size: 1rem;
      letter-spacing: .25em;
      pointer-events: none;
    }

    #runeCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .suggestions {
      display: grid;
      gap: 10px;
    }

    .rune-card {
      display: grid;
      grid-template-columns: 52px 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 10px;
      border-radius: 14px;
      border: 1px solid #ae8d60;
      background: linear-gradient(180deg, rgba(255,247,225,.85), rgba(235,216,177,.88));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.3);
    }

    .rune-glyph {
      display: grid;
      place-items: center;
      width: 52px;
      height: 52px;
      border-radius: 12px;
      border: 1px solid #b28d5c;
      background: radial-gradient(circle at top, #f6e9ca, #dcc28e 75%);
      color: #6e4518;
      font-size: 1.75rem;
      line-height: 1;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.35);
    }

    .rune-card h3 {
      margin: 0 0 4px;
      font-size: .98rem;
      color: #5b3918;
    }

      color: #7a5a3b;
